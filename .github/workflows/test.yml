name: Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest numpy pyarrow
      
      - name: Run Rust tests
        run: cargo test --lib --release --verbose
        timeout-minutes: 10
      
      - name: Run Arrow-specific tests
        run: |
          cargo test --lib --release test_arrow_quantized_layer
          cargo test --lib --release test_quantize_layer_arrow
          cargo test --lib --release test_dequantize_group
          cargo test --lib --release test_parallel_dequantization
        timeout-minutes: 5
      
      - name: Run integration tests
        run: cargo test --lib --release test_apply_time_aware_quantization
        timeout-minutes: 5
      
      - name: Build extension
        run: |
          maturin build --release --strip
          python -m pip install --force-reinstall target/wheels/*.whl
        timeout-minutes: 10
        shell: bash
      
      - name: Run Python tests
        run: pytest tests/ -v
        timeout-minutes: 5
      
      - name: Run Arrow Python integration tests
        run: |
          pytest tests/test_py_arrow_quantized_layer.py -v
          pytest tests/test_arrow_integration.py -v
        timeout-minutes: 5
      
      - name: Check code formatting
        run: cargo fmt -- --check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      
      - name: Run clippy
        run: cargo clippy -- -D warnings
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
