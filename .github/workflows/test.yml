name: Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11']
        include:
          - os: macos-latest
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.11'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest numpy pyarrow
      
      - name: Run Rust tests
        run: cargo test --lib --release --verbose
        timeout-minutes: 15
        continue-on-error: false
      
      - name: Build extension
        run: |
          maturin build --release --strip || maturin build --release
          python -m pip install --force-reinstall target/wheels/*.whl || echo "No wheel found, skipping Python tests"
        timeout-minutes: 10
        shell: bash
        continue-on-error: false
      
      - name: Run Python tests
        run: |
          if python -c "import arrow_quant_v2" 2>/dev/null; then
            pytest tests/ -v -k "not slow"
          else
            echo "arrow_quant_v2 module not available, skipping Python tests"
            exit 0
          fi
        timeout-minutes: 5
        continue-on-error: true
      
      - name: Run Arrow Python integration tests
        run: |
          if python -c "import arrow_quant_v2" 2>/dev/null; then
            pytest tests/test_py_arrow_quantized_layer.py -v
            pytest tests/test_arrow_integration.py -v
          else
            echo "arrow_quant_v2 module not available, skipping Arrow integration tests"
            exit 0
          fi
        timeout-minutes: 5
        continue-on-error: true
      
      - name: Check code formatting
        run: cargo fmt -- --check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      
      - name: Run clippy
        run: cargo clippy --lib -- -W clippy::all
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
